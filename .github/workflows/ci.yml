name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: gofmt
        run: test -z "$(gofmt -s -l .)" || (gofmt -s -l . && exit 1)
      - name: vet
        run: go vet ./...
      - name: test
        run: go test ./... -race -coverpkg=./... -coverprofile=cover.out
      - name: coverage gate (>80%)
        run: |
          total=$(go tool cover -func=cover.out | awk '/^total:/ {sub(/%/, "", $3); print $3}')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t >= 80.0) ? 0 : 1 }'
      - name: fuzz smoke
        run: |
          go test ./rcpg -fuzz='FuzzParse$' -fuzztime=30s
          go test ./rcpg -fuzz=FuzzParseLazy -fuzztime=20s
          go test ./rcpg/rrsr -fuzz=FuzzParse -fuzztime=15s
