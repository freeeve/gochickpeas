name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: gofmt
        run: test -z "$(gofmt -s -l .)" || (gofmt -s -l . && exit 1)
      - name: vet
        run: go vet ./...
      - name: test
        # The coverage denominator excludes what CI cannot exercise by
        # design: cmd/* bench mains (validated by the bench-emit protocol
        # running them against real LDBC data) and internal/ldbc kernels
        # (validated by the env-gated SF1 harness plus the 89-query parity
        # manifest, neither of which fits in CI).
        run: |
          pkgs=$(go list ./... | grep -v "/cmd/" | grep -v "internal/ldbc" | tr '\n' ',' | sed 's/,$//')
          go test ./... -race -coverpkg="$pkgs" -coverprofile=cover.out
      - name: coverage gate (>80%)
        run: |
          total=$(go tool cover -func=cover.out | awk '/^total:/ {sub(/%/, "", $3); print $3}')
          echo "total coverage: ${total}%"
          awk -v t="$total" 'BEGIN { exit (t >= 80.0) ? 0 : 1 }'
      - name: fuzz smoke
        run: |
          go test ./rcpg -fuzz='FuzzParse$' -fuzztime=30s
          go test ./rcpg -fuzz=FuzzParseLazy -fuzztime=20s
          go test ./rcpg/rrsr -fuzz=FuzzParse -fuzztime=15s
